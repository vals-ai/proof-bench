name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  validate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install .

      - name: Run validation + export
        run: python proof_bench/validate_and_export.py

      - name: Upload JSONL artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-bench-jsonl
          path: data/proof-bench.jsonl

      - name: Build Lean project
        uses: leanprover/lean-action@v1
        with:
          auto-config: true

